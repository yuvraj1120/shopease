# Server Configuration
server.port=8080
spring.application.name=shopease

# H2 In-Memory Database (for local development — no setup needed)
spring.datasource.url=jdbc:h2:mem:shopease
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# H2 Console — access at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator endpoints — for health checks and Prometheus metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Logging
logging.level.com.shopease=DEBUG